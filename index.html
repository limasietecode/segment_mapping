<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Architectural Segment Mapper</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://cdn.jsdelivr.net/npm/polybooljs@1.2.0/dist/polybool.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="workspace">
      <!-- Left Toolbar (Illustrator style) -->
      <div id="left-toolbar">
        <button id="toolSelect" title="Select (V)" class="tool-btn active"><i class="ph ph-cursor"></i></button>
        
        <div class="tool-group">
          <button id="toolShape" title="Shapes (M)" class="tool-btn">
            <i id="currentShapeIcon" class="ph ph-square"></i>
            <span class="flyout-arrow"></span>
          </button>
          <div class="flyout-menu" id="shapeFlyout">
            <button class="flyout-btn active" data-shape="rect" data-icon="ph-square"><i class="ph ph-square"></i> Rectangle</button>
            <button class="flyout-btn" data-shape="ellipse" data-icon="ph-circle"><i class="ph ph-circle"></i> Ellipse</button>
            <button class="flyout-btn" data-shape="round_rect" data-icon="ph-app-window"><i class="ph ph-app-window"></i> Rounded Rect</button>
            <button class="flyout-btn" data-shape="triangle" data-icon="ph-triangle"><i class="ph ph-triangle"></i> Triangle</button>
            <button class="flyout-btn" data-shape="diamond" data-icon="ph-diamond"><i class="ph ph-diamond"></i> Diamond</button>
            <button class="flyout-btn" data-shape="trapezoid" data-icon="ph-navigation-arrow"><i class="ph ph-navigation-arrow"></i> Trapezoid</button>
            <button class="flyout-btn" data-shape="human" data-icon="ph-user"><i class="ph ph-user"></i> Human Scale</button>
          </div>
        </div>

        <button id="toolPoly" title="Polygon (P)" class="tool-btn"><i class="ph ph-polygon"></i></button>
        <button id="toolCurve" title="Chaikin Curve (C)" class="tool-btn"><i class="ph ph-bezier-curve"></i></button>
        
        <!-- Transform Toolbar Group -->
        <div class="tool-group">
          <button id="toolTransform" title="Transform (T)" class="tool-btn">
            <i id="currentTransformIcon" class="ph ph-arrows-out-cardinal"></i>
            <span class="flyout-arrow"></span>
          </button>
          <div class="flyout-menu" id="transformFlyout">
            <button class="flyout-btn-tx active" data-tx="copy" data-icon="ph-copy"><i class="ph ph-copy"></i> Copy</button>
            <button class="flyout-btn-tx" data-tx="rotate" data-icon="ph-arrows-clockwise"><i class="ph ph-arrows-clockwise"></i> Rotate</button>
            <button class="flyout-btn-tx" data-tx="mirror" data-icon="ph-arrows-left-right"><i class="ph ph-arrows-left-right"></i> Mirror</button>
            <button class="flyout-btn-tx" data-tx="shear" data-icon="ph-parallelogram"><i class="ph ph-parallelogram"></i> Shear</button>
            <div class="divider"></div>
            <button class="flyout-btn-tx" data-tx="array_rect" data-icon="ph-squares-four"><i class="ph ph-squares-four"></i> Rect Array</button>
            <button class="flyout-btn-tx" data-tx="array_polar" data-icon="ph-spinner"><i class="ph ph-spinner"></i> Polar Array</button>
          </div>
        </div>

        <button id="toolPan" title="Pan (H)" class="tool-btn"><i class="ph ph-hand-palm"></i></button>
        <div class="divider"></div>
        <button id="toolCalibrate" title="Calibrate Scale (S)" class="tool-btn"><i class="ph ph-ruler"></i></button>
        <button id="btnFloor" title="Add Floor Plane" class="tool-btn"><i class="ph ph-align-bottom"></i></button>
        <button id="btnShrinkwrap" title="Compute Shrinkwrap" class="tool-btn"><i class="ph ph-bounding-box"></i></button>
        <div class="divider"></div>
        <button id="btnLayersToggle" title="Layers (L)" class="tool-btn"><i class="ph ph-stack"></i></button>
      </div>

      <!-- Main Canvas Area -->
      <div id="main-view">
        <div id="canvas-wrapper">
          <canvas id="mainCanvas" width="1920" height="1080"></canvas>
        </div>

        <!-- Floating Properties Panel -->
        <div id="floating-panel" class="floating-window">
          <div class="window-header">Properties</div>
          <div class="window-content">
            <label>Semantic Class</label>
            <select id="semanticColor">
              <option value="#FF0000">Wall / Partition (Red)</option>
              <option value="#00FF00">Window / Glazing (Green)</option>
              <option value="#0000FF">Door / Opening (Blue)</option>
              <option value="#FFFF00">Slab / Floor (Yellow)</option>
              <option value="#FF00FF">Roof / Canopy (Magenta)</option>
              <option value="#00FFFF">Stairs / Steps (Cyan)</option>
              <option value="#FFA500">Facade Pattern (Orange)</option>
              <option value="#800080">Furniture / Fixture (Purple)</option>
              <option value="#FFFFFF">Ignore (White)</option>
            </select>
            
            <div id="propertiesPanel" style="display:none; margin-top:15px;">
              <label>Transform</label>
              <div class="props-grid">
                 <div><label>X</label><input type="number" id="propX"></div>
                 <div><label>Y</label><input type="number" id="propY"></div>
                 <div><label>W</label><input type="number" id="propW"></div>
                 <div><label>H</label><input type="number" id="propH"></div>
              </div>
              <div style="font-size:12px; color:#4ade80; margin-top:8px; border-top:1px solid #444; padding-top:8px;">
                  <strong>Area:</strong> <span class="propAreaVal">0</span> <span class="propAreaUnit">px²</span>
              </div>
            </div>
            
            <div id="multiPropertiesPanel" style="display:none; margin-top:15px;">
                <p style="font-size:11px; color:#60a5fa; margin-bottom: 5px; font-weight:600;" id="multiSelectionText">3 Items Selected</p>
                <div class="props-grid" style="gap:6px; margin-bottom: 10px;">
                   <button id="btnBoolUnite" class="mini-btn" title="Unite/Merge"><i class="ph ph-intersect"></i> Unite</button>
                   <button id="btnBoolSubtract" class="mini-btn" title="Subtract Front from Back"><i class="ph ph-exclude"></i> Subtract</button>
                   <button id="btnBoolIntersect" class="mini-btn" title="Intersect"><i class="ph ph-intersect-three"></i> Intersect</button>
                </div>
                <div style="font-size:12px; color:#4ade80; margin-top:8px; border-top:1px solid #444; padding-top:8px; margin-bottom:10px;">
                    <strong>Total Area:</strong> <span class="propAreaVal">0</span> <span class="propAreaUnit">px²</span>
                </div>
            </div>

            <div class="props-grid" style="margin-top:12px; gap:6px;">
               <button id="btnGroup" class="mini-btn"><i class="ph ph-bounding-box"></i> Group (Ctrl+G)</button>
               <button id="btnUngroup" class="mini-btn"><i class="ph ph-exclude"></i> Ungroup</button>
               <button id="btnMakeBlock" class="mini-btn" title="Create Reusable Symbol"><i class="ph ph-cube"></i> Make Block</button>
               <button id="btnEditBlock" class="mini-btn primary" style="display:none;"><i class="ph ph-pencil-simple"></i> Edit Block</button>
               <button id="btnExitBlockEdit" class="mini-btn primary" style="display:none; background-color: #22c55e;"><i class="ph ph-check-square"></i> Save Block</button>
            </div>
            
            <div class="props-grid" style="margin-top:12px; gap:6px;">
               <div style="display:flex; align-items:center;"><label style="width:50%;">Wall Thk:</label> <input type="number" id="propWallThickness" value="10" style="width:40px;"></div>
               <button id="btnWallOffset" class="mini-btn" title="Generate Wall Shell"><i class="ph ph-rectangle"></i> Create Walls</button>
            </div>
            
            <div style="margin-top:20px;">
                <label style="display:flex;justify-content:space-between;"><span>Global Shrinkwrap</span> <span id="shrinkOffsetVal" style="color:#fff">10</span></label>
                <input type="range" id="shrinkOffset" min="0" max="50" value="10">
            </div>
          </div>
        </div>

        <!-- Floating Layers Panel -->
        <div id="layers-panel" class="floating-window" style="display:none; top:20px; left:70px; width:280px; max-height:60vh;">
          <div class="window-header" style="display:flex; justify-content:space-between; align-items:center;">
            <span>Layers</span>
            <div style="display:flex; gap:4px;">
              <button id="btnLayerAdd" class="layer-hdr-btn" title="Add empty layer"><i class="ph ph-plus"></i></button>
              <button id="btnLayerDelete" class="layer-hdr-btn" title="Delete selected layer"><i class="ph ph-trash"></i></button>
            </div>
          </div>
          <div class="window-content" style="padding:8px;">
            <div style="display:flex; gap:6px; margin-bottom:8px; align-items:center;">
              <select id="layerBlendMode" style="flex:1; font-size:10px; padding:4px;">
                <option value="source-over">Normal</option>
                <option value="multiply">Multiply</option>
                <option value="screen">Screen</option>
                <option value="overlay">Overlay</option>
                <option value="darken">Darken</option>
                <option value="lighten">Lighten</option>
                <option value="color-dodge">Color Dodge</option>
                <option value="color-burn">Color Burn</option>
                <option value="hard-light">Hard Light</option>
                <option value="soft-light">Soft Light</option>
                <option value="difference">Difference</option>
                <option value="exclusion">Exclusion</option>
                <option value="hue">Hue</option>
                <option value="saturation">Saturation</option>
                <option value="color">Color</option>
                <option value="luminosity">Luminosity</option>
              </select>
              <label style="font-size:10px; color:#888; margin:0; white-space:nowrap;">Op:</label>
              <input type="range" id="layerOpacity" min="0" max="100" value="100" style="width:60px;">
              <span id="layerOpacityVal" style="font-size:10px; color:#fff; width:28px; text-align:right;">100%</span>
            </div>
            <div id="layersList" style="overflow-y:auto; max-height:calc(60vh - 120px);"></div>
          </div>
        </div>

        <!-- Floating Array Panel -->
        <div id="array-panel" class="floating-window" style="display:none; top: 15px; left: 70px; width: 220px;">
          <div class="window-header" id="arrayPanelTitle">Properties</div>
          <div class="window-content" id="arrayRectOptions" style="display:none;">
              <div class="props-grid">
                  <div><label>Rows</label><input type="number" id="arrRows" value="2" min="1"></div>
                  <div><label>Cols</label><input type="number" id="arrCols" value="2" min="1"></div>
                  <div><label>Gap Y</label><input type="number" id="arrGapY" value="10"></div>
                  <div><label>Gap X</label><input type="number" id="arrGapX" value="10"></div>
              </div>
              <button id="btnApplyRectArray" class="mini-btn primary" style="width:100%; margin-top:10px; justify-content:center;">Apply Array</button>
          </div>
          <div class="window-content" id="arrayPolarOptions" style="display:none;">
              <div class="props-grid">
                  <div style="grid-column: 1 / span 2; display:flex; align-items:center;"><label style="width:40px;">Count</label><input type="number" id="arrCount" value="6" min="2"></div>
                  <div style="grid-column: 1 / span 2; display:flex; align-items:center;"><label style="width:40px;">Angle</label><input type="number" id="arrAngle" value="360" title="Degrees"></div>
              </div>
              <p style="font-size:10px; color:#aaa; margin-top:8px;">Rotates automatically along its own center.</p>
              <button id="btnApplyPolarArray" class="mini-btn primary" style="width:100%; margin-top:10px; justify-content:center;">Apply Array</button>
          </div>
        </div>
      </div>
      
      <!-- Right AI Panel -->
      <div id="right-panel">
        <div class="panel-header"><i class="ph ph-magic-wand"></i> AI Generate</div>
        <div class="panel-content">
          <label>Prompt</label>
          <textarea id="aiPrompt" rows="4" placeholder="A modern concrete house at sunset, architectural photography..."></textarea>
          
          <label>Style</label>
          <select id="aiStyle">
            <option value="photorealistic">Photorealistic</option>
            <option value="watercolor">Watercolor</option>
            <option value="sketch">Pencil Sketch</option>
            <option value="cyberpunk">Cyberpunk / Sci-Fi</option>
            <option value="none">None (Use prompt only)</option>
          </select>

          <button id="btnGenerateAI" class="generate-btn">
            <i class="ph ph-sparkle"></i> Generate Image
          </button>
          <div id="aiLoading" style="display:none; text-align:center; color:#888; margin-top:10px; font-size:12px;">
            <i class="ph ph-spinner ph-spin"></i> Generating with Fal.ai...
          </div>
        </div>
      </div>
    </div>

    <!-- Comparison Modal -->
    <div id="comparisonModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <span>Generated Result</span>
          <button id="btnCloseModal" class="close-btn"><i class="ph ph-x"></i></button>
        </div>
        <div class="comparison-container">
          <div class="img-wrapper">
            <div class="img-label">Original Segmentation</div>
            <img id="imgOriginal" src="">
          </div>
          <div class="img-wrapper">
            <div class="img-label">AI Generation</div>
            <img id="imgGenerated" src="">
          </div>
        </div>
        <div class="modal-footer">
          <button id="btnDownloadResult" class="mini-btn primary"><i class="ph ph-download-simple"></i> Download Image</button>
        </div>
      </div>
    </div>

    <!-- Bottom Status Bar -->
    <div id="bottom-bar">
      <div class="status-group">
        <label>Underlay Image:</label>
        <button id="btnUploadImage" class="mini-btn" onclick="document.getElementById('bgImageUpload').click()"><i class="ph ph-upload-simple"></i> Upload</button>
        <input type="file" id="bgImageUpload" accept="image/png, image/jpeg" style="display:none">
        <button id="btnRemoveImage" class="mini-btn danger" style="display:none;" title="Remove Image"><i class="ph ph-trash"></i></button>
        <div class="divider-v"></div>
        <label>Opacity:</label>
        <input type="range" id="bgImageOpacity" min="0" max="1" step="0.01" value="0.5" style="width: 80px;">
        <span id="bgImageOpacityVal">50%</span>
      </div>
      
      <div class="status-group" style="margin-left:20px;">
        <label>Canvas BG Intensity:</label>
        <input type="range" id="bgColor" min="0" max="255" value="255" style="width: 80px;">
      </div>
      
      <div class="status-group right" style="margin-left: auto;">
        <button id="btnLoadJSON" class="mini-btn" onclick="document.getElementById('jsonUpload').click()"><i class="ph ph-folder-open"></i> Load State</button>
        <input type="file" id="jsonUpload" accept=".json" style="display:none">
        <button id="btnSaveJSON" class="mini-btn"><i class="ph ph-floppy-disk"></i> Save State</button>
        <button id="btnExportPNG" class="mini-btn primary"><i class="ph ph-export"></i> Export PNG Mask</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
