<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Semantic Segment Mapping</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="sidebar">
    <div class="sidebar-header">
      <h2>Segment Editor</h2>
      <p>Semantic Map Generator</p>
    </div>
    
    <div class="controls-section">
      <h3>Tools</h3>
      <div class="toolbar-grid">
        <button id="toolSelect" class="btn-action active">Select (V)</button>
        <button id="toolRect" class="btn-action">Rectangle (M)</button>
        <button id="toolPoly" class="btn-action">Polygon (P)</button>
        <button id="toolPan" class="btn-action">Pan (H)</button>
      </div>
    </div>
    
    <div class="controls-section">
        <label>Current Selected Class</label>
        <select id="semanticColor">
          <option value="#FF0000">Wall / Partition (Red)</option>
          <option value="#00FF00">Window / Glazing (Green)</option>
          <option value="#0000FF">Door / Opening (Blue)</option>
          <option value="#FFFF00">Slab / Floor (Yellow)</option>
          <option value="#FF00FF">Roof / Canopy (Magenta)</option>
          <option value="#00FFFF">Stairs / Steps (Cyan)</option>
          <option value="#FFA500">Facade Pattern (Orange)</option>
          <option value="#800080">Furniture / Fixture (Purple)</option>
          <option value="#FFFFFF">Ignore (White)</option>
        </select>
        <p class="helper-text">Changes color of selected shape or defines color for new shapes.</p>
      </div>

      <div class="control-group">
        <label>Layer Settings</label>
        <button id="btnFloor" class="btn-toggle">Add Floor Plane</button>
      </div>

      <div class="control-group">
        <label>Shrinkwrap Offset: <span id="shrinkOffsetVal">10</span>px</label>
        <input type="range" id="shrinkOffset" min="0" max="50" value="10">
        <button id="btnShrinkwrap" class="btn-toggle" style="margin-top: 15px;">Compute Shrinkwrap</button>
      </div>
    </div>
    
    <div id="propertiesPanel" class="controls-section" style="display:none;">
      <h3>Properties</h3>
      <div class="props-grid">
         <div><label>X:</label><input type="number" id="propX"></div>
         <div><label>Y:</label><input type="number" id="propY"></div>
         <div><label>W:</label><input type="number" id="propW"></div>
         <div><label>H:</label><input type="number" id="propH"></div>
      </div>
      <p class="helper-text">Layer: [ bring forward, ] send back</p>
    </div>

    <div class="controls-section">
      <h3>Reference Underlay</h3>
      <div class="file-upload-wrapper">
        <button id="btnUploadImage" class="btn-secondary" onclick="document.getElementById('bgImageUpload').click()">Upload Reference Image</button>
        <button id="btnRemoveImage" class="btn-secondary" style="display:none; margin-top:5px; color:#ff6b6b; border-color: rgba(255,107,107,0.3);">Remove Image</button>
        <input type="file" id="bgImageUpload" accept="image/png, image/jpeg" style="display:none">
      </div>
      <div class="control-group">
        <label>Reference Opacity <span id="bgImageOpacityVal">50%</span></label>
        <input type="range" id="bgImageOpacity" min="0" max="1" step="0.01" value="0.5">
      </div>
      <div class="control-group">
        <label>Background Intensity (Grayscale)</label>
        <input type="range" id="bgColor" min="0" max="255" value="255">
      </div>
    </div>

    <div class="controls-section export-section">
      <h3>Export System</h3>
      <div class="action-grid">
        <button id="btnExportPNG" class="btn-primary">Export PNG Mask</button>
        <button id="btnSaveJSON" class="btn-secondary">Save JSON State</button>
        <button id="btnLoadJSON" class="btn-secondary" onclick="document.getElementById('jsonUpload').click()">Load JSON State</button>
        <input type="file" id="jsonUpload" accept=".json" style="display:none">
      </div>
    </div>
  </div>
  
  <div id="main-view">
    <div id="canvas-wrapper">
      <canvas id="mainCanvas" width="720" height="1000"></canvas>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
